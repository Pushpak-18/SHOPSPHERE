{% extends 'main.html' %}
{% load static %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/reset_password.css' %}">{% endblock %}
{% block content %}
<center>
    <h1>Reset password</h1>
    <form action="" method="POST">
        {% csrf_token %}
        {% if error %}<div style="background:rgba(255,101,132,0.1);border:1px solid rgba(255,101,132,0.3);border-radius:8px;padding:12px 16px;font-size:0.85rem;color:#ff8fa3;">{{ error }}</div>{% endif %}
        <label>Username</label>
        <input type="text" value="{{ request.user.username }}" readonly>
        {% if new_pass %}
            <label for="new_pass">New Password</label>
            <input type="password" name="new_pass" id="new_pass" placeholder="Enter new password">
        {% else %}
            <label for="old_pass">Current Password</label>
            <input type="password" name="old_pass" id="old_pass" placeholder="Enter current password">
        {% endif %}
        <button type="submit">Update Password</button>
    </form>
</center>
{% endblock %}
