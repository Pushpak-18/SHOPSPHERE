{% extends 'main.html' %}
{% load static %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/update_profile.css' %}">{% endblock %}
{% block content %}
<center>
    <h1>Edit Profile</h1>
    <form action="" method="POST">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" value="{{ request.user.username }}" disabled>
        <label for="fname">First Name</label>
        <input type="text" name="fname" id="fname" value="{{ request.user.first_name }}" placeholder="First name">
        <label for="lname">Last Name</label>
        <input type="text" name="lname" id="lname" value="{{ request.user.last_name }}" placeholder="Last name">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" value="{{ request.user.email }}" placeholder="Email address">
        <button type="submit">Save Changes</button>
    </form>
    <a href="{% url 'profile' %}" style="margin-top:16px;font-size:0.85rem;color:var(--text-muted);text-decoration:none;">← Back to Profile</a>
</center>
{% endblock %}
