{% extends 'main.html' %}
{% load static %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/login_.css' %}">{% endblock %}
{% block content %}
<center>
    <h1>Welcome back</h1>
    <form action="" method="POST">
        {% csrf_token %}
        {% if error %}<div style="background:rgba(255,101,132,0.1);border:1px solid rgba(255,101,132,0.3);border-radius:8px;padding:12px 16px;font-size:0.85rem;color:#ff8fa3;">{{ error }}</div>{% endif %}
        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="your_username" autocomplete="username">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button type="submit">Sign In</button>
    </form>
    <a href="{% url 'forgot_pass' %}" style="margin-top:16px;font-size:0.85rem;color:var(--text-muted);text-decoration:none;">Forgot password? <span style="color:var(--accent-light);">Reset it →</span></a>
    <a href="{% url 'register' %}" style="margin-top:8px;font-size:0.85rem;color:var(--text-muted);text-decoration:none;">No account? <span style="color:var(--accent-light);">Create one →</span></a>
</center>
{% endblock %}
